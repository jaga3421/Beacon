name: Build & Release APK

# Runs on every push to main EXCEPT the automated version-bump commit itself
on:
  push:
    branches: [ main ]

jobs:
  build:
    # Skip the automated version-bump commits to avoid an infinite loop
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the version bump and create releases

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0   # full history so we can push back

      # ── JDK 17 ────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── Read current version and compute next ─────────────────────────────
      - name: Compute next version
        id: ver
        run: |
          CUR_CODE=$(grep 'versionCode = ' app/build.gradle.kts | grep -o '[0-9]*')
          CUR_NAME=$(grep 'versionName = ' app/build.gradle.kts | grep -oP '(?<=")[^"]+(?=")')

          NEW_CODE=$((CUR_CODE + 1))

          # Split 1.0.x → major.minor.patch; if no patch yet treat as 0
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CUR_NAME"
          PATCH=${PATCH:-0}
          NEW_NAME="${MAJOR}.${MINOR}.$((PATCH + 1))"

          echo "cur_code=$CUR_CODE"  >> $GITHUB_OUTPUT
          echo "cur_name=$CUR_NAME"  >> $GITHUB_OUTPUT
          echo "new_code=$NEW_CODE"  >> $GITHUB_OUTPUT
          echo "new_name=$NEW_NAME"  >> $GITHUB_OUTPUT

          echo "Bumping $CUR_NAME (code $CUR_CODE) → $NEW_NAME (code $NEW_CODE)"

      # ── Bump version in build.gradle.kts ──────────────────────────────────
      - name: Bump version
        run: |
          sed -i "s/versionCode = ${{ steps.ver.outputs.cur_code }}/versionCode = ${{ steps.ver.outputs.new_code }}/" app/build.gradle.kts
          sed -i "s/versionName = \"${{ steps.ver.outputs.cur_name }}\"/versionName = \"${{ steps.ver.outputs.new_name }}\"/" app/build.gradle.kts

      # ── Sync website version.json ──────────────────────────────────────────
      - name: Sync website version
        run: |
          cat > website/version.json << 'VEOF'
          {
            "version": "${{ steps.ver.outputs.new_name }}",
            "apkUrl": "https://github.com/jaga3421/Beacon/releases/download/v${{ steps.ver.outputs.new_name }}/Beacon-v${{ steps.ver.outputs.new_name }}.apk"
          }
          VEOF

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      # ── Rename APK with version ────────────────────────────────────────────
      - name: Rename APK
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk \
             Beacon-v${{ steps.ver.outputs.new_name }}.apk

      # ── Commit version bump back to main ──────────────────────────────────
      - name: Commit and push version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts website/version.json
          git commit -m "ci: bump version to ${{ steps.ver.outputs.new_name }} [skip ci]"
          git push

      # ── Create GitHub Release with APK attached ───────────────────────────
      - name: Create GitHub Release
        run: |
          gh release create "v${{ steps.ver.outputs.new_name }}" \
            "Beacon-v${{ steps.ver.outputs.new_name }}.apk" \
            --title "Beacon v${{ steps.ver.outputs.new_name }}" \
            --notes "Automated build from [\`${{ github.sha }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})" \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
